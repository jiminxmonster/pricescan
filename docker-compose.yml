services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricescan-backend
    restart: unless-stopped
    init: true
    ipc: host
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8400:8000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/pricescan.db
      NAVER_DAILY_REQUEST_LIMIT: ${NAVER_DAILY_REQUEST_LIMIT:-200}
      DANAWA_DAILY_REQUEST_LIMIT: ${DANAWA_DAILY_REQUEST_LIMIT:-100}
      ENURI_DAILY_REQUEST_LIMIT: ${ENURI_DAILY_REQUEST_LIMIT:-60}
      PLAYWRIGHT_SEARCH_ENABLED: ${PLAYWRIGHT_SEARCH_ENABLED:-1}
      SCRAPLING_SEARCH_ENABLED: ${SCRAPLING_SEARCH_ENABLED:-1}
      PLAYWRIGHT_TIMEOUT_MS: ${PLAYWRIGHT_TIMEOUT_MS:-18000}
    volumes:
      - pricescan_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pricescan-frontend
    restart: unless-stopped
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 8300
    ports:
      - "8300:8300"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      VITE_BASE_PATH: /pricescan/
    depends_on:
      - backend

volumes:
  pricescan_data:
